name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  quality:
    name: Lint, Type Check, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Unit & Integration Tests
        run: npx vitest run

      - name: Build
        run: npm run build
        env:
          # ── Sanity (미설정 상태 → 더미값으로 빌드만 통과) ──
          NEXT_PUBLIC_SANITY_PROJECT_ID: dummy-project-id
          NEXT_PUBLIC_SANITY_DATASET: production
          # ── Database (빌드 시 실제 연결 불필요) ──
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          # ── NextAuth ──
          NEXTAUTH_SECRET: ci-dummy-secret-32chars-placeholder
          NEXTAUTH_URL: http://localhost:3000
          AUTH_SECRET: ci-dummy-secret-32chars-placeholder
          # ── Supabase ──
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-key
          # ── 외부 서비스 (빌드 시 불필요) ──
          KAKAO_CLIENT_ID: dummy
          KAKAO_CLIENT_SECRET: dummy
          RESEND_API_KEY: dummy
          TOSS_SECRET_KEY: dummy
          UPSTASH_REDIS_REST_URL: https://dummy.upstash.io
          UPSTASH_REDIS_REST_TOKEN: dummy
